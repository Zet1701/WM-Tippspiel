
<!DOCTYPE html>
<html lang="de">
<head>

<title>⚽ WM 2026 Tippspiel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyCV7ySIkMYarUmltjezzOJDvqgpI2ChW_8",
  authDomain: "wm-tippspiel-c58dd.firebaseapp.com",
  databaseURL: "https://wm-tippspiel-c58dd-default-rtdb.europe-west1.firebasedatabase.app",

  appId: "1:987152976990:web:d1e107ce6a519b355af8cf"
});
const db = firebase.database();

<script type="text/babel">
const { useState, useEffect } = React;

function getTend(score) {
  if (score===null||score===undefined||score==="") return null;
  const parts = score.split(":");
  if (parts.length!==2) return null;
  const h=parseInt(parts[0],10), a=parseInt(parts[1],10);
  if (isNaN(h)||isNaN(a)) return null;
  return h>a?"H":h<a?"A":"X";
}

function calcPoints(tip, result) {
  if (!result) return null;
  const realTend = getTend(result);
  const exakt = tip?.exakt;
  const tend  = tip?.tend;
  if (exakt) {
    const [rh,ra] = result.split(":").map(Number);
    const [th,ta] = exakt.split(":").map(Number);
    if (!isNaN(th)&&!isNaN(ta)) {
      if (th===rh&&ta===ra) return 5;
      if (getTend(exakt)===realTend) return 2;
      return 0;
    }
  }
  if (tend) return tend===realTend ? 2 : 0;
  return null;
}

function fmtDate(d) {
  if (!d) return "";
  return new Date(d+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"});
}

function App() {
  const [view, setView]           = useState("login");
  const [username, setUsername]   = useState("");
  const [nameInput, setNameInput] = useState("");
  const [matches, setMatches]     = useState([]);
  const [allTips, setAllTips]     = useState({});
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [adminPW, setAdminPW]     = useState("");
  const [saved, setSaved]         = useState(false);
  const [connected, setConnected] = useState(false);

  useEffect(() => {
    // Firebase Listener
    const mRef = db.ref("matches");
    const tRef = db.ref("tips");
    const cRef = db.ref(".info/connected");

    cRef.on("value", snap => setConnected(snap.val()));
    mRef.on("value", snap => {
      const val = snap.val();
      if (val) {
        const arr = Object.entries(val).map(([k,v])=>({...v,id:k}))
          .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
        setMatches(arr);
      } else setMatches([]);
    });
    tRef.on("value", snap => setAllTips(snap.val() || {}));

    return () => { mRef.off(); tRef.off(); cRef.off(); };
  }, []);

  async function saveMatch(m) {
    const { id, ...data } = m;
    if (id) await db.ref(`matches/${id}`).set(data);
    else {
      const ref = db.ref("matches").push();
      await ref.set(data);
    }
  }

  async function deleteMatch(id) { await db.ref(`matches/${id}`).remove(); }
  async function setResult(id, val) { await db.ref(`matches/${id}/result`).set(val||null); }

  async function writeTip(matchId, tend, exakt) {
    const prev = allTips[username]?.[matchId] || {};
    const val  = { tend: tend!==undefined?tend:prev.tend||null, exakt: exakt!==undefined?exakt:prev.exakt||null };
    if (!val.tend && val.exakt) val.tend = getTend(val.exakt);
    await db.ref(`tips/${username}/${matchId}`).set(val);
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
  }

  async function clearTip(matchId) {
    await db.ref(`tips/${username}/${matchId}`).remove();
  }

  function getRangliste() {
    return Object.entries(allTips).map(([name, tips]) => {
      let pts=0, exaktC=0, tendC=0;
      matches.forEach(m => {
        const p = calcPoints(tips[m.id], m.result);
        if (p===5){pts+=5;exaktC++;}
        else if (p===2){pts+=2;tendC++;}
      });
      return { name, pts, exakt: exaktC, tend: tendC };
    }).sort((a,b)=>b.pts-a.pts||b.exakt-a.exakt);
  }

  const today     = new Date().toISOString().split("T")[0];
  const todayM    = matches.filter(m=>m.date===today && !m.result);
  const upcomingM = matches.filter(m=>m.date>today);
  const pastM     = matches.filter(m=>m.date<today || m.result);
  const rang      = getRangliste();
  const koenig    = rang[0];

  if (view==="login") return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"linear-gradient(135deg,#0a0a0f,#0f1a2e)"}}>
      <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:20,padding:"48px 36px",textAlign:"center",maxWidth:360,width:"90%"}}>
        <div style={{fontSize:64,marginBottom:12}}>🏆</div>
        <h1 style={{fontSize:26,fontWeight:800,marginBottom:8}}>WM 2026 Tippspiel</h1>
        <p style={{color:"#9ca3af",marginBottom:28}}>Wer wird <span style={{color:"#f5c518",fontWeight:700}}>Wettkönig</span>?</p>
        {!connected && <p style={{color:"#f87171",fontSize:12,marginBottom:12}}>⚠️ Verbinde mit Datenbank...</p>}
        <input style={S.input} placeholder="Dein Name..." value={nameInput}
          onChange={e=>setNameInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&(setUsername(nameInput.trim()),setView("tippen"))}
          autoFocus />
        <button style={S.btnPrimary} onClick={()=>{if(nameInput.trim()){setUsername(nameInput.trim());setView("tippen");}}}>
          Tippen starten ⚽
        </button>
      </div>
    </div>
  );

  return (
    <div style={{background:"#0a0a0f",minHeight:"100vh"}}>
      <div style={S.header}>
        <span style={{fontWeight:800,fontSize:18}}>⚽ WM 2026 <span style={{color:"#f5c518"}}>Tippspiel</span></span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:connected?"#4ade80":"#f87171",display:"inline-block"}}></span>
          {saved && <span style={{background:"#16a34a",padding:"3px 10px",borderRadius:20,fontSize:12}}>✓ Gespeichert</span>}
          <span style={S.badge}>👤 {username}</span>
        </div>
      </div>

      <div style={S.nav}>
        {[["tippen","📝 Tippen"],["rangliste","🏆 Rangliste"],["admin","⚙️ Admin"]].map(([v,l])=>(
          <button key={v} style={{...S.navBtn,...(view===v?S.navActive:{})}} onClick={()=>setView(v)}>{l}</button>
        ))}
        <button style={{...S.navBtn,marginLeft:"auto",color:"#6b7280"}} onClick={()=>{setView("login");setUsername("");}}>Abmelden</button>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 14px 80px"}}>

        {view==="tippen" && <>
          {matches.length===0 && (
            <div style={{textAlign:"center",padding:"60px 20px",color:"#6b7280"}}>
              <div style={{fontSize:48,marginBottom:16}}>⚽</div>
              <p>Noch keine Spiele eingetragen.</p>
              <p style={{fontSize:13,marginTop:8}}>Der Admin trägt die Spiele ein!</p>
            </div>
          )}
          {todayM.length>0    && <Section title="🔥 Heute">{todayM.map(m=><MatchCard key={m.id} m={m} tip={allTips[username]?.[m.id]} onTip={(t,e)=>writeTip(m.id,t,e)} onClear={()=>clearTip(m.id)} allTips={allTips}/>)}</Section>}
          {upcomingM.length>0 && <Section title="📅 Kommende Spiele">{upcomingM.map(m=><MatchCard key={m.id} m={m} tip={allTips[username]?.[m.id]} onTip={(t,e)=>writeTip(m.id,t,e)} onClear={()=>clearTip(m.id)} allTips={allTips}/>)}</Section>}
          {pastM.length>0     && <Section title="✅ Abgeschlossene Spiele">{pastM.map(m=><MatchCard key={m.id} m={m} tip={allTips[username]?.[m.id]} onTip={(t,e)=>writeTip(m.id,t,e)} onClear={()=>clearTip(m.id)} allTips={allTips} past/>)}</Section>}
        </>}

        {view==="rangliste" && <>
          {koenig && (
            <div style={{background:"linear-gradient(135deg,#1a1200,#2d2000)",border:"2px solid #f5c518",borderRadius:20,padding:28,textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:44}}>👑</div>
              <div style={{fontWeight:800,fontSize:22,color:"#f5c518"}}>{koenig.name}</div>
              <div style={{color:"#9ca3af",fontSize:13,marginTop:4}}>Aktueller Wettkönig</div>
              <div style={{fontSize:32,fontWeight:800,marginTop:8}}>{koenig.pts} Punkte</div>
            </div>
          )}
          {rang.length===0 && <p style={{color:"#6b7280",textAlign:"center",padding:40}}>Noch keine Tipps.</p>}
          {rang.length>0 && (
            <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:16,overflow:"hidden"}}>
              <div style={{display:"flex",padding:"10px 16px",background:"#1f2937",color:"#6b7280",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>
                <span style={{width:36}}>#</span><span style={{flex:1}}>Name</span>
                <span style={{width:60,textAlign:"center"}}>⭐ Exakt</span>
                <span style={{width:65,textAlign:"center"}}>✓ Tend.</span>
                <span style={{width:60,textAlign:"right"}}>Punkte</span>
              </div>
              {rang.map((r,i)=>(
                <div key={r.name} style={{display:"flex",padding:"13px 16px",borderTop:"1px solid #1f2937",alignItems:"center",fontSize:14,
                  background:r.name===username?"rgba(245,197,24,.07)":"transparent",
                  borderLeft:r.name===username?"3px solid #f5c518":"3px solid transparent"}}>
                  <span style={{width:36,fontWeight:700,color:i===0?"#f5c518":i===1?"#aaa":i===2?"#cd7f32":"#555"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</span>
                  <span style={{flex:1,fontWeight:r.name===username?700:400}}>{r.name}</span>
                  <span style={{width:60,textAlign:"center",color:"#4ade80"}}>{r.exakt}</span>
                  <span style={{width:65,textAlign:"center",color:"#60a5fa"}}>{r.tend}</span>
                  <span style={{width:60,textAlign:"right",fontWeight:700,color:"#f5c518"}}>{r.pts}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:14,color:"#6b7280",fontSize:12,flexWrap:"wrap"}}>
            <span>⭐ Exakt = <b style={{color:"#f5c518"}}>5 Punkte</b></span>
            <span>✓ Tendenz = <b style={{color:"#60a5fa"}}>2 Punkte</b></span>
          </div>
        </>}

        {view==="admin" && (
          !adminUnlocked ? (
            <div style={{maxWidth:360,margin:"40px auto",textAlign:"center"}}>
              <h2 style={{marginBottom:20}}>⚙️ Admin-Bereich</h2>
              <input style={S.input} type="password" placeholder="Admin-Passwort..." value={adminPW}
                onChange={e=>setAdminPW(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&(adminPW==="wettkoenig2026"?setAdminUnlocked(true):alert("Falsches Passwort!"))} />
              <button style={S.btnPrimary} onClick={()=>adminPW==="wettkoenig2026"?setAdminUnlocked(true):alert("Falsches Passwort!")}>Einloggen</button>
              <p style={{color:"#555",fontSize:11,marginTop:8}}>Passwort: wettkoenig2026</p>
            </div>
          ) : <AdminPanel matches={matches} onSave={saveMatch} onDelete={deleteMatch} onResult={setResult} />
        )}

      </div>
    </div>
  );
}

function AdminPanel({ matches, onSave, onDelete, onResult }) {
  const [tab, setTab] = useState("spiele");
  const [nm, setNm]   = useState({ date:"", time:"", home:"", away:"", group:"" });
  const [msg, setMsg] = useState("");

  async function addMatch() {
    const { date, time, home, away, group } = nm;
    if (!date||!time||!home||!away||!group) { setMsg("⚠️ Alle Felder ausfüllen!"); return; }
    await onSave({ date, time, home:home.trim(), away:away.trim(), group:group.trim().toUpperCase(), result:null });
    setNm({ date:"", time:"", home:"", away:"", group:"" });
    setMsg("✅ Spiel hinzugefügt!"); setTimeout(()=>setMsg(""),2000);
  }

  return (
    <div>
      <h2 style={{marginBottom:16}}>⚙️ Admin-Panel</h2>
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {[["spiele","📋 Spiele"],["ergebnisse","⚽ Ergebnisse"]].map(([t,l])=>(
          <button key={t} style={{...S.navBtn,...(tab===t?S.navActive:{})}} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      {tab==="spiele" && <>
        <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:14,padding:20,marginBottom:20}}>
          <h3 style={{marginBottom:16,color:"#f5c518"}}>➕ Neues Spiel</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div><label style={S.label}>Datum</label><input style={S.input} type="date" value={nm.date} onChange={e=>setNm({...nm,date:e.target.value})} /></div>
            <div><label style={S.label}>Uhrzeit (MESZ)</label><input style={S.input} type="time" value={nm.time} onChange={e=>setNm({...nm,time:e.target.value})} /></div>
            <div><label style={S.label}>Heimteam</label><input style={S.input} placeholder="Deutschland" value={nm.home} onChange={e=>setNm({...nm,home:e.target.value})} /></div>
            <div><label style={S.label}>Auswärtsteam</label><input style={S.input} placeholder="Curaçao" value={nm.away} onChange={e=>setNm({...nm,away:e.target.value})} /></div>
            <div><label style={S.label}>Gruppe</label><input style={S.input} placeholder="E" value={nm.group} onChange={e=>setNm({...nm,group:e.target.value})} maxLength={2} /></div>
          </div>
          {msg && <p style={{color:msg.startsWith("✅")?"#4ade80":"#f87171",fontSize:13,marginBottom:10}}>{msg}</p>}
          <button style={S.btnPrimary} onClick={addMatch}>Hinzufügen ➕</button>
        </div>
        <h3 style={{marginBottom:10,color:"#9ca3af",fontSize:14}}>Alle Spiele ({matches.length})</h3>
        {matches.length===0 && <p style={{color:"#555",fontSize:13}}>Noch keine Spiele.</p>}
        {matches.map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"#111827",border:"1px solid #1f2937",borderRadius:10,marginBottom:6}}>
            <span style={{background:"#1f2937",color:"#f5c518",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:700}}>Gr.{m.group}</span>
            <span style={{color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(m.date)} {m.time}</span>
            <span style={{flex:1,fontSize:13}}>{m.home} – {m.away}</span>
            {m.result && <span style={{color:"#4ade80",fontWeight:700,fontSize:13}}>{m.result}</span>}
            <button onClick={()=>confirm("Löschen?")&&onDelete(m.id)} style={{background:"none",border:"1px solid #7f1d1d",color:"#f87171",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12}}>✕</button>
          </div>
        ))}
      </>}

      {tab==="ergebnisse" && <>
        <p style={{color:"#6b7280",fontSize:13,marginBottom:16}}>Format: <b style={{color:"#fff"}}>2:1</b> — leer = noch offen</p>
        {matches.length===0 && <p style={{color:"#555",fontSize:13}}>Keine Spiele vorhanden.</p>}
        {matches.map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #1f2937"}}>
            <span style={{background:"#1f2937",color:"#f5c518",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:700}}>Gr.{m.group}</span>
            <span style={{color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(m.date)} {m.time}</span>
            <span style={{flex:1,color:"#ccc",fontSize:13}}>{m.home} – {m.away}</span>
            <input style={{background:"#1f2937",border:`1px solid ${m.result?"#4ade80":"#374151"}`,color:"#fff",padding:"6px 10px",borderRadius:8,width:70,fontSize:14,fontWeight:700,textAlign:"center",outline:"none"}}
              placeholder=":" value={m.result||""}
              onChange={e=>onResult(m.id, e.target.value)} />
          </div>
        ))}
      </>}
    </div>
  );
}

function MatchCard({ m, tip, onTip, onClear, allTips, past }) {
  const [exaktInput, setExaktInput] = useState(tip?.exakt||"");
  useEffect(()=>setExaktInput(tip?.exakt||""),[tip]);

  const currentTend  = tip?.tend  || null;
  const currentExakt = tip?.exakt || null;
  const tipCount = Object.values(allTips).filter(t=>t[m.id]?.tend||t[m.id]?.exakt).length;
  const pts = calcPoints(tip, m.result);

  function commitExakt(v) {
    const c=v.trim();
    if(/^\d+:\d+$/.test(c)) onTip(undefined,c);
    else if(c===""||c===":") { onTip(currentTend,""); setExaktInput(""); }
    else setExaktInput(currentExakt||"");
  }
  function handleTend(t) { if(currentTend===t&&!currentExakt){onClear();return;} onTip(t,undefined); }

  return (
    <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:14,padding:16,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{background:"#1f2937",color:"#f5c518",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700}}>Gr. {m.group}</span>
          <span style={{color:"#6b7280",fontSize:12}}>{fmtDate(m.date)} · {m.time} Uhr</span>
        </div>
        {tipCount>0 && <span style={{color:"#6b7280",fontSize:12}}>👥 {tipCount}</span>}
      </div>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",margin:"14px 0"}}>
        <div style={{flex:1,fontWeight:700,fontSize:15,color:"#e5e7eb"}}>{m.home}</div>
        <div style={{width:80,textAlign:"center"}}>
          {m.result
            ? <span style={{background:"#1f2937",color:"#fff",padding:"6px 14px",borderRadius:8,fontWeight:800,fontSize:18}}>{m.result}</span>
            : <span style={{color:"#374151",fontWeight:700}}>VS</span>}
        </div>
        <div style={{flex:1,fontWeight:700,fontSize:15,color:"#e5e7eb",textAlign:"right"}}>{m.away}</div>
      </div>

      {!past && !m.result && (<>
        <div style={{marginBottom:10}}>
          <p style={{color:"#6b7280",fontSize:12,marginBottom:6}}>Wer gewinnt? <span style={{color:"#374151"}}>(2 Pkt)</span></p>
          <div style={{display:"flex",gap:5}}>
            {[["H",`${m.home.split(" ")[0]} gewinnt`],["X","Unentschieden"],["A",`${m.away.split(" ")[0]} gewinnt`]].map(([t,l])=>(
              <button key={t} style={{flex:1,background:currentTend===t?"#1e3a5f":"#1f2937",border:`1px solid ${currentTend===t?"#3b82f6":"#374151"}`,color:currentTend===t?"#93c5fd":"#d1d5db",padding:"8px 4px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:currentTend===t?700:400}}
                onClick={()=>handleTend(t)}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{padding:"10px 12px",background:"#0d1117",borderRadius:10}}>
          <p style={{color:"#6b7280",fontSize:12,marginBottom:6}}>Exaktes Ergebnis? <span style={{color:"#374151"}}>(+3 Bonus)</span></p>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input style={{background:"#1f2937",border:`1px solid ${currentExakt?"#4ade80":"#374151"}`,color:"#fff",padding:"7px 10px",borderRadius:8,width:70,fontSize:15,fontWeight:700,textAlign:"center",outline:"none"}}
              placeholder=":" value={exaktInput}
              onChange={e=>setExaktInput(e.target.value)}
              onBlur={e=>commitExakt(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&commitExakt(exaktInput)} />
            {currentExakt && <span style={{color:"#4ade80",fontSize:13}}>✓ {currentExakt}</span>}
            {currentExakt && <button onClick={()=>{onTip(currentTend,"");setExaktInput("");}} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:20,padding:"0 4px"}}>×</button>}
          </div>
        </div>
      </>)}

      {m.result && tip && pts!==null && (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,padding:"8px 12px",background:"#0d1117",borderRadius:8}}>
          <span style={{color:"#9ca3af",fontSize:13}}>Tipp: <b style={{color:"#fff"}}>{currentExakt||(currentTend==="H"?m.home:currentTend==="A"?m.away:"Unentschieden")}</b></span>
          <span style={{padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,color:"#fff",background:pts===5?"#16a34a":pts>=2?"#1d4ed8":"#7f1d1d"}}>
            {pts===5?"⭐ +5 Exakt!":pts>=2?"✓ +2 Tendenz":"✗ 0 Punkte"}
          </span>
        </div>
      )}
    </div>
  );
}

function Section({title,children}) {
  return <div style={{marginBottom:28}}>
    <h2 style={{fontSize:13,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:1,marginBottom:10,borderBottom:"1px solid #1f2937",paddingBottom:6}}>{title}</h2>
    {children}
  </div>;
}

const S = {
  header:{background:"#111827",borderBottom:"1px solid #1f2937",padding:"13px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:99},
  badge:{background:"#1f2937",padding:"4px 12px",borderRadius:20,fontSize:13,color:"#d1d5db"},
  nav:{display:"flex",gap:4,padding:"8px 14px",background:"#0d1117",borderBottom:"1px solid #1f2937",flexWrap:"wrap"},
  navBtn:{background:"transparent",border:"1px solid #374151",color:"#9ca3af",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:500},
  navActive:{background:"#1f2937",color:"#f5c518",borderColor:"#f5c518"},
  input:{display:"block",width:"100%",background:"#1f2937",border:"1px solid #374151",color:"#fff",padding:"10px 12px",borderRadius:8,fontSize:14,marginBottom:4,outline:"none"},
  label:{display:"block",color:"#9ca3af",fontSize:12,marginBottom:4},
  btnPrimary:{width:"100%",background:"#f5c518",color:"#0a0a0f",border:"none",padding:"12px",borderRadius:10,fontSize:15,fontWeight:800,cursor:"pointer"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
